<!DOCTYPE html>
<html>
<head>
  <script src="https://cdn.jsdelivr.net/npm/vega@5"></script>
  <script src="https://cdn.jsdelivr.net/npm/vega-lite@5"></script>
  <script src="https://cdn.jsdelivr.net/npm/vega-embed@6"></script>

  <style>
    html, body {
      margin: 0;
      width: 100%;
    }

    #chart {
      width: 100%;
    }

    .vega-embed,
    .vega-embed canvas,
    .vega-embed svg {
      width: 100% !important;
    }
  </style>
</head>
<body>
  <div id="chart"></div>

  <script>
    vegaEmbed('#chart', 'data/Appunti_Uni-clean.json', {
      actions: false
    }).then(result => {
      result.view.resize();
    });
  </script>
</body>
</html>
