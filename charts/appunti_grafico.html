<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Code Archaeology</title>

  <script src="https://cdn.jsdelivr.net/npm/vega@5"></script>
  <script src="https://cdn.jsdelivr.net/npm/vega-lite@5"></script>
  <script src="https://cdn.jsdelivr.net/npm/vega-embed@6"></script>

  <style>
    body {
      font-family: sans-serif;
      padding: 2rem;

      display: flex;
      flex-direction: column;
      align-items: center;
    }

    h1 {
      text-align: center;
    }

    #chart {
      display: flex;
      justify-content: center;
      width: 100%;
    }
  </style>
</head>

<body>
  <h1>Evoluzione degli appunti</h1>

  <div id="chart"></div>

  <script>
    vegaEmbed(
      '#chart',
      '../charts/<nomerepo>-clean.json',
      { actions: false }
    );
  </script>
</body>
</html>
